version: '3.9'

services:

  vehicle-service:
    build:
      context: .
      dockerfile: vehicle-service/Dockerfile
    ports:
      - "8081:8081"   # REST / actuator
      - "9091:9091"   # gRPC
    environment:
      - FLEET_AUTH_JWT_SECRET=your-256-bit-secret-change-in-production
      - FLEET_AUTH_SKIP_AUTH_METHODS=grpc.health.v1.Health/Check,grpc.reflection
    networks:
      - fleet-network

  trip-service:
    build:
      context: .
      dockerfile: trip-service/Dockerfile
    ports:
      - "8082:8082"
      - "9092:9092"
    environment:
      - FLEET_AUTH_JWT_SECRET=your-256-bit-secret-change-in-production
      - FLEET_AUTH_SKIP_AUTH_METHODS=grpc.health.v1.Health/Check,grpc.reflection
      # Spring Boot maps GRPC_CLIENT_VEHICLESERVICE_ADDRESS → grpc.client.vehicle-service.address
      # (dots and hyphens in property names both become _ in env vars)
      - GRPC_CLIENT_VEHICLESERVICE_ADDRESS=static://vehicle-service:9091
    depends_on:
      - vehicle-service
    networks:
      - fleet-network

  document-service:
    build:
      context: .
      dockerfile: document-service/Dockerfile
    ports:
      - "8083:8083"
      - "9093:9093"
    environment:
      - FLEET_AUTH_JWT_SECRET=your-256-bit-secret-change-in-production
      - FLEET_AUTH_SKIP_AUTH_METHODS=grpc.health.v1.Health/Check,grpc.reflection
    volumes:
      - doc-storage:/tmp/fleet-documents
    networks:
      - fleet-network

networks:
  fleet-network:
    driver: bridge

volumes:
  doc-storage:
