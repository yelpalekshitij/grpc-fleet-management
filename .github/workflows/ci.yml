name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate proto stubs
        run: ./gradlew :proto:generateProto --no-daemon

      - name: Build all modules (skip tests)
        run: ./gradlew build -x test --no-daemon

      # ── Unit / Integration Tests ──────────────────────────────────────────────
      # Tests use in-process gRPC — no services need to be running.

      - name: Test — vehicle-service
        run: ./gradlew :vehicle-service:test --no-daemon

      - name: Test — trip-service
        run: ./gradlew :trip-service:test --no-daemon

      - name: Test — document-service
        run: ./gradlew :document-service:test --no-daemon

      # ── End-to-End: Demo Client ───────────────────────────────────────────────
      # Start the three services in Docker (jars are already built above),
      # then run the demo client against live gRPC endpoints.

      - name: Start services (Docker Compose)
        run: docker compose up -d

      - name: Wait for gRPC ports to be ready
        run: |
          echo "Waiting for gRPC ports..."
          for port in 9091 9092 9093; do
            printf "  port %s " "$port"
            timeout 120 bash -c "until nc -z 127.0.0.1 $port 2>/dev/null; do sleep 2; printf '.'; done"
            echo " ready"
          done
          # Brief pause for Spring context to finish initializing after TCP opens
          sleep 8

      - name: Run demo client (end-to-end)
        run: java -jar grpc-client/build/libs/grpc-client-1.0.0.jar

      - name: Stop services
        if: always()
        run: docker compose down

      # ── Artifacts ─────────────────────────────────────────────────────────────

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            vehicle-service/build/reports/tests/test/
            trip-service/build/reports/tests/test/
            document-service/build/reports/tests/test/
          retention-days: 7
